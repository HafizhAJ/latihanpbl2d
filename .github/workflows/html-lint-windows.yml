name: Cek Kode HTML (Windows)

on:
  push:
    branches: 
      -main
    pull_request:

jobs: 
  lint:
    runs-out: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@uv4

    - name: Install HTMLHint
      run: npm install -g htmlhint

    - name: Periksa HTML
      run: htmlhint "**/*.html
